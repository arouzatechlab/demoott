<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Dashboard | Stackly Stream</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --netflix-red: #e50914;
        --netflix-red-dark: #b20710;
        --bg-main: #141414;
        --bg-black: #000000;
        --bg-card: #181818;
        --bg-light: #222222;
        --text-primary: #ffffff;
        --text-secondary: #e5e5e5;
        --text-muted: #b3b3b3;
        --border: #333333;
        --success: #46d369;
        --warning: #f1c40f;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", "Segoe UI", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Prevent horizontal scroll on body */
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        display: flex;
        min-height: 100vh;
      }

      /* --- SIDEBAR --- */
      .stklycreator-sidebar {
        width: 250px;
        background-color: var(--bg-black);
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        z-index: 1000;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .stklycreator-sidebar-header {
        padding: 25px;
        color: var(--netflix-red);
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .stklycreator-close-btn {
        display: none;
        cursor: pointer;
        font-size: 1.5rem;
        color: var(--text-muted);
      }

      .stklycreator-nav {
        flex: 1;
        padding: 10px 0;
        overflow-y: auto;
      }

      .stklycreator-nav-item {
        padding: 14px 25px;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        border-left: 4px solid transparent;
      }

      .stklycreator-nav-item:hover {
        background: var(--bg-light);
        color: var(--text-primary);
      }

      .stklycreator-nav-item.active {
        background: rgba(229, 9, 20, 0.1);
        color: white;
        border-left-color: var(--netflix-red);
        font-weight: 600;
      }

      /* --- MAIN AREA --- */
      .stklycreator-main {
        margin-left: 250px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        width: calc(100% - 250px); /* Explicit width calc */
        min-width: 0; /* Important for flex children */
      }

      /* TOP BAR */
      .stklycreator-topbar {
        height: 70px;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 25px;
        position: sticky;
        top: 0;
        z-index: 900;
        border-bottom: 1px solid var(--border);
      }

      .stklycreator-welcome-group {
        display: flex;
        align-items: center;
        gap: 15px;
        min-width: 0; /* Allows text truncation */
      }

      .stklycreator-menu-toggle {
        display: none;
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
        color: white;
        padding: 5px;
      }

      .stklycreator-topbar h2 {
        font-size: 1.1rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .stklycreator-user-meta {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
      }

      .stklycreator-user-email {
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .stklycreator-logout {
        background: var(--netflix-red);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .stklycreator-logout:hover {
        background: var(--netflix-red-dark);
      }

      /* CONTENT SECTIONS */
      .stklycreator-content {
        padding: 25px;
        animation: fadeIn 0.4s ease-out;
        max-width: 100%; /* Ensure it never exceeds parent */
        width: 100%;
        overflow-x: hidden; /* Inner content guard */
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* STATS CARDS */
      .stklycreator-stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
        width: 100%;
      }

      .stklycreator-stat-card {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid var(--border);
        transition: all 0.3s ease;
        min-width: 0; /* Prevents overflow in grid */
      }

      .stklycreator-stat-label {
        color: var(--text-muted);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .stklycreator-stat-value {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--text-primary);
      }

      /* CHARTS */
      .stklycreator-charts-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stklycreator-chart-container {
        background: var(--bg-card);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
        min-height: 320px;
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      /* REVENUE TABLE */
      .stklycreator-table-container {
        background: var(--bg-card);
        border-radius: 12px;
        overflow-x: auto;
        border: 1px solid var(--border);
        width: 100%;
        max-width: 100%;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        min-width: 600px; /* Ensure table remains readable via scroll */
      }

      th,
      td {
        padding: 15px 20px;
        border-bottom: 1px solid var(--border);
      }

      /* CONTENT LIBRARY */
      .stklycreator-library-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        width: 100%;
      }

      /* OVERLAY */
      .stklycreator-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 950;
        backdrop-filter: blur(5px);
      }

      /* --- RESPONSIVE BREAKPOINTS --- */
      @media (max-width: 1024px) {
        .stklycreator-sidebar {
          transform: translateX(-100%);
        }
        .stklycreator-sidebar.active {
          transform: translateX(0);
        }
        .stklycreator-main {
          margin-left: 0;
          width: 100%;
        }
        .stklycreator-menu-toggle,
        .stklycreator-close-btn {
          display: block;
        }
        .stklycreator-overlay.active {
          display: block;
        }
      }

      @media (max-width: 768px) {
        .stklycreator-stats-row {
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
          gap: 15px;
        }
        .stklycreator-stat-card {
          padding: 15px;
        }
        .stklycreator-stat-value {
          font-size: 1.3rem;
        }
        .stklycreator-topbar h2 {
          font-size: 0.95rem;
        }
      }

      @media (max-width: 640px) {
        .stklycreator-user-email {
          display: none;
        }
        .stklycreator-content {
          padding: 15px;
        }
        .stklycreator-topbar {
          padding: 0 15px;
        }
        .stklycreator-charts-row {
          grid-template-columns: 1fr;
        }
        .stklycreator-chart-container {
          min-height: 280px;
        }
        .stklycreator-library-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .stklycreator-stats-row {
          grid-template-columns: 1fr;
        } /* Stack stats on very small screens */
        .stklycreator-logout {
          padding: 6px 12px;
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="stklycreator-overlay"
      id="overlay"
      onclick="toggleSidebar()"
    ></div>

    <aside class="stklycreator-sidebar" id="sidebar">
      <div class="stklycreator-sidebar-header">
        <span>STACKLY</span>
        <span class="stklycreator-close-btn" onclick="toggleSidebar()">✕</span>
      </div>
      <nav class="stklycreator-nav">
        <div
          class="stklycreator-nav-item active"
          onclick="loadSection('dashboard', this)"
        >
          Dashboard
        </div>
        <div
          class="stklycreator-nav-item"
          onclick="loadSection('analytics', this)"
        >
          Analytics
        </div>
        <div
          class="stklycreator-nav-item"
          onclick="loadSection('revenue', this)"
        >
          Revenue
        </div>
        <div
          class="stklycreator-nav-item"
          onclick="loadSection('library', this)"
        >
          Content Library
        </div>
        <div
          class="stklycreator-nav-item"
          onclick="loadSection('messages', this)"
        >
          Messages
        </div>
        <div
          class="stklycreator-nav-item"
          onclick="loadSection('tickets', this)"
        >
          Tickets
        </div>
        <div
          class="stklycreator-nav-item"
          onclick="loadSection('settings', this)"
        >
          Settings
        </div>
      </nav>
    </aside>

    <div class="stklycreator-main">
      <header class="stklycreator-topbar">
        <div class="stklycreator-welcome-group">
          <button class="stklycreator-menu-toggle" onclick="toggleSidebar()">
            ☰
          </button>
          <h2 id="welcome-text">Welcome, Creator</h2>
        </div>
        <div class="stklycreator-user-meta">
          <span class="stklycreator-user-email" id="user-email"
            >email@example.com</span
          >
          <button
            class="stklycreator-logout"
            onclick="window.location.href = './index.html'"
          >
            Logout
          </button>
        </div>
      </header>

      <div id="main-content" class="stklycreator-content">
        <!-- Dynamic Content -->
      </div>
    </div>

    <script>
      // --- AUTH ---
      const userStr =
        localStorage.getItem("stkly_user") || localStorage.getItem("user");
      if (!userStr) window.location.href = "./login.html";
      const user = JSON.parse(userStr);
      const creatorName = user.email ? user.email.split("@")[0] : "Creator";
      const displayName =
        creatorName.charAt(0).toUpperCase() + creatorName.slice(1);

      document.getElementById("welcome-text").textContent =
        `Welcome, ${displayName}`;
      document.getElementById("user-email").textContent = user.email || "";

      function logout() {
        localStorage.removeItem("stkly_user");
        localStorage.removeItem("user");
        window.location.href = "./login.html";
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        const isActive = sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
        document.body.style.overflow = isActive ? "hidden" : "auto";
      }

      function animateCounter(id, target) {
        const el = document.getElementById(id);
        if (!el) return;
        let current = 0;
        const duration = 1000;
        const frameRate = 20;
        const step = target / (duration / frameRate);
        const timer = setInterval(() => {
          current += step;
          if (current >= target) {
            el.textContent = target.toLocaleString();
            clearInterval(timer);
          } else {
            el.textContent = Math.floor(current).toLocaleString();
          }
        }, frameRate);
      }

      const sections = {
        dashboard: `
                <h3 style="margin-bottom:20px">Overview</h3>
                <div class="stklycreator-stats-row">
                    <div class="stklycreator-stat-card">
                        <div class="stklycreator-stat-label">Total Views</div>
                        <div class="stklycreator-stat-value" id="stat-views">0</div>
                    </div>
                    <div class="stklycreator-stat-card">
                        <div class="stklycreator-stat-label">Subscribers</div>
                        <div class="stklycreator-stat-value" id="stat-subs">0</div>
                    </div>
                    <div class="stklycreator-stat-card">
                        <div class="stklycreator-stat-label">Total Revenue</div>
                        <div class="stklycreator-stat-value">$<span id="stat-rev">0</span></div>
                    </div>
                    <div class="stklycreator-stat-card">
                        <div class="stklycreator-stat-label">Active Content</div>
                        <div class="stklycreator-stat-value" id="stat-content">0</div>
                    </div>
                </div>
                <div class="stklycreator-charts-row">
                    <div class="stklycreator-chart-container"><canvas id="viewsChart"></canvas></div>
                    <div class="stklycreator-chart-container"><canvas id="genreChart"></canvas></div>
                </div>
            `,
        analytics: `
                <h3>Detailed Analytics</h3>
                <div class="stklycreator-chart-container" style="margin-top:20px; height: 450px">
                    <canvas id="bigViewsChart"></canvas>
                </div>
            `,
        revenue: `
                <h3>Revenue Stream</h3>
                <div class="stklycreator-table-container" style="margin-top:20px">
                    <table>
                        <thead><tr><th>Date</th><th>Source</th><th>Amount</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr><td>Oct 24, 2023</td><td>Ad Revenue</td><td>$1,240.00</td><td><span class="stklycreator-badge stklycreator-badge-closed" style="padding:4px 10px; border-radius:20px; font-size:0.75rem; background: rgba(70, 211, 105, 0.2); color: #46d369;">Paid</span></td></tr>
                            <tr><td>Oct 20, 2023</td><td>Sponsorship</td><td>$5,000.00</td><td><span class="stklycreator-badge stklycreator-badge-closed" style="padding:4px 10px; border-radius:20px; font-size:0.75rem; background: rgba(70, 211, 105, 0.2); color: #46d369;">Paid</span></td></tr>
                        </tbody>
                    </table>
                </div>
            `,
        library: `
                <h3>Content Library</h3>
                <div class="stklycreator-library-grid" style="margin-top:20px">
                    ${[1, 2, 3, 4]
                      .map(
                        (i) => `
                        <div class="stklycreator-lib-card" style="background:var(--bg-card); border:1px solid var(--border); border-radius:8px; overflow:hidden;">
                            <img src="./assets/404.webp" style="width:100%; aspect-ratio:16/9; object-fit:cover;">
                            <div style="padding:15px;">
                                <div style="font-weight:600">The Silent Sea S0${i}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted); margin-top:5px">Views: ${i * 12}k</div>
                                <div style="display:flex; gap:10px; margin-top:15px;">
                                    <button style="flex:1; padding:8px; background:var(--bg-light); border:1px solid var(--border); color:white; border-radius:4px; cursor:pointer;" onclick="window.location.href = './404.html'">Edit</button>
                                    <button style="flex:1; padding:8px; background:var(--bg-light); border:1px solid var(--border); color:var(--netflix-red); border-radius:4px; cursor:pointer;" onclick="window.location.href = './404.html'">Delete</button>
                                </div>
                            </div>
                        </div>
                    `,
                      )
                      .join("")}
                </div>
            `,
        messages: `
                <h3>Messages</h3>
                <div class="stklycreator-table-container" style="margin-top:20px">
                    <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:600">Alex Johnson</div>
                            <div style="font-size:0.85rem; color:var(--text-muted)">Great upload!</div>
                        </div>
                        <button style="padding:6px 15px; background:var(--netflix-red); color:white; border:none; border-radius:4px; cursor:pointer;" onclick="window.location.href = './404.html'">Reply</button>
                    </div>
                </div>
            `,
        tickets: `
                <h3>Support Tickets</h3>
                <div class="stklycreator-table-container" style="margin-top:20px">
                    <table>
                        <thead><tr><th>ID</th><th>Issue</th><th>Status</th></tr></thead>
                        <tbody><tr><td>#8821</td><td>Payout delay</td><td><span style="color:var(--netflix-red)">Open</span></td></tr></tbody>
                    </table>
                </div>
            `,
        settings: `
                <h3>Settings</h3>
                <div style="max-width:600px; margin-top:20px; background:var(--bg-card); padding:25px; border-radius:12px; border:1px solid var(--border);">
                    <div style="margin-bottom:15px">
                        <label style="font-size:0.75rem; color:var(--text-muted);">DISPLAY NAME</label>
                        <input type="text" value="${displayName}" style="width:100%; padding:12px; background:var(--bg-light); border:1px solid var(--border); color:white; border-radius:4px; margin-top:5px;">
                    </div>
                    <button style="width:100%; padding:12px; background:var(--netflix-red); border:none; color:white; font-weight:700; border-radius:4px; cursor:pointer;" onclick="window.location.href = './404.html'">Save Changes</button>
                </div>
            `,
      };

      function loadSection(section, element) {
        if (
          window.innerWidth <= 1024 &&
          document.getElementById("sidebar").classList.contains("active")
        ) {
          toggleSidebar();
        }
        document
          .querySelectorAll(".stklycreator-nav-item")
          .forEach((i) => i.classList.remove("active"));
        if (element) element.classList.add("active");

        const container = document.getElementById("main-content");
        container.innerHTML = sections[section];

        if (section === "dashboard") {
          animateCounter("stat-views", 125400);
          animateCounter("stat-subs", 4820);
          animateCounter("stat-rev", 12850);
          animateCounter("stat-content", 42);
          setTimeout(initDashboardCharts, 100);
        } else if (section === "analytics") {
          setTimeout(initBigChart, 100);
        }
        window.scrollTo(0, 0);
      }

      function initDashboardCharts() {
        const chartOptions = {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: "#b3b3b3", font: { size: 10 } } },
          },
          scales: {
            y: {
              grid: { color: "#333" },
              ticks: { color: "#888", font: { size: 10 } },
            },
            x: {
              grid: { display: false },
              ticks: { color: "#888", font: { size: 10 } },
            },
          },
        };

        const vCtx = document.getElementById("viewsChart");
        if (vCtx) {
          new Chart(vCtx.getContext("2d"), {
            type: "line",
            data: {
              labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
              datasets: [
                {
                  label: "Views",
                  data: [12000, 19000, 15000, 25000, 22000, 30000],
                  borderColor: "#e50914",
                  tension: 0.4,
                  fill: true,
                  backgroundColor: "rgba(229, 9, 20, 0.05)",
                },
              ],
            },
            options: chartOptions,
          });
        }

        const gCtx = document.getElementById("genreChart");
        if (gCtx) {
          new Chart(gCtx.getContext("2d"), {
            type: "doughnut",
            data: {
              labels: ["Sci-Fi", "Drama", "Action"],
              datasets: [
                {
                  data: [50, 30, 20],
                  backgroundColor: ["#e50914", "#888", "#333"],
                  borderWidth: 0,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { position: "bottom", labels: { color: "#b3b3b3" } },
              },
            },
          });
        }
      }

      function initBigChart() {
        const ctx = document.getElementById("bigViewsChart");
        if (ctx) {
          new Chart(ctx.getContext("2d"), {
            type: "bar",
            data: {
              labels: ["W1", "W2", "W3", "W4", "W5", "W6"],
              datasets: [
                {
                  label: "Watch Time",
                  data: [400, 600, 500, 800, 1000, 1200],
                  backgroundColor: "#e50914",
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: { grid: { color: "#333" }, ticks: { color: "#888" } },
                x: { grid: { display: false }, ticks: { color: "#888" } },
              },
            },
          });
        }
      }

      window.onload = () =>
        loadSection(
          "dashboard",
          document.querySelector(".stklycreator-nav-item"),
        );
    </script>
  </body>
</html>
